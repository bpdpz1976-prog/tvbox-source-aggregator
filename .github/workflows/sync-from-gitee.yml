name: Sync and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Prepare Deployment Files
        run: |
          # 1. 创建一个临时目录用来存放要发布的文件
          mkdir -p ./deploy-dist

          # 2. 复制 public 文件夹下的所有内容 (网页文件)
          # 注意：这里假设你的网页文件在 public 目录下
          cp -r public/* ./deploy-dist/

          # 3. 复制 server.js (如果存在)
          # 这样既保证了网页能访问，也保证了 Docker 能找到 server.js
          if [ -f "server.js" ]; then
            cp server.js ./deploy-dist/
          fi

          # 4. 复制 .nojekyll (防止 GitHub Pages 忽略特定文件)
          if [ -f ".nojekyll" ]; then
            cp .nojekyll ./deploy-dist/
          fi

          # 列出文件确认一下 (调试用)
          ls -la ./deploy-dist/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy-dist
          # 强制推送到 gh-pages 分支
          destination_dir: ./
