name: Build and Deploy Site

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # 每小时自动运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Site
        run: |
          npm run build
          # 如果你的项目有特殊的构建命令，比如 generate 或者其他的，请替换上面这行

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # 假设构建产物在 dist 目录，如果是 public 或其他目录请修改
