name: Build and Deploy Site

# 👇 权限设置
permissions:
  contents: write
  pages: write
  id-token: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Site
        run: npm run build:node

      # 👇 新增一步：自动查找构建出来的文件夹
      - name: Find Dist Directory
        id: find_dir
        run: |
          # 优先找 dist，如果没有就找 public
          if [ -d "dist" ]; then
            echo "dir=dist" >> $GITHUB_OUTPUT
          elif [ -d "public" ]; then
            echo "dir=public" >> $GITHUB_OUTPUT
          else
            echo "未找到 dist 或 public 目录，请检查构建命令"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 👇 这里使用上面自动找到的目录
          publish_dir: ./${{ steps.find_dir.outputs.dir }}
