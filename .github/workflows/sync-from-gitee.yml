name: Build and Deploy Site

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies & Build
        run: |
          npm install
          # 运行构建脚本，生成 server.js
          npm run build:node

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          # 强制推送，覆盖 gh-pages 分支的所有内容
          force: true
          # 排除不需要的文件，只保留网页和 server.js
          exclude: |
            .git
            .github
            README.md
            package.json
            package-lock.json
            .gitignore
            # 排除源文件，只保留编译后的文件
            src/
            # 排除测试文件
            test/
            # 排除其他不需要的文件
            .eslintrc.js
            .prettierrc
