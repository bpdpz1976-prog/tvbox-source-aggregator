name: Build and Deploy Site

# 👇 必须添加这一段，赋予写入权限
permissions:
  contents: write
  pages: write
  id-token: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 安装依赖
      - name: Install dependencies
        run: npm install

      # 4. 执行构建 (注意：这里生成的通常是 dist 文件夹)
      - name: Build Site
        run: npm run build:node

      # 5. 调试步骤：列出文件看看 (可选，方便排查)
      - name: List files
        run: ls -la

      # 6. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 👇 关键点：这里必须写 ./dist，因为 Vite 默认输出 dist
          publish_dir: ./dist
