name: Build and Deploy Site

on:
  push:
    branches:
      - main

# 这里的权限设置是为了让 Action 有权限把代码推送到 gh-pages 分支
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 安装 Node.js (使用最通用的版本)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 安装依赖 (去掉缓存配置，防止报错)
      - name: Install Dependencies
        run: npm install

      # 4. 构建项目 (修正了拼写错误)
      - name: Build Project
        run: npm run build

      # 5. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
